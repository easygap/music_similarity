# Render.com Blueprint — 원클릭 배포용.
# 사용법: 이 레포를 GitHub 에 푸시한 뒤 Render 에서 "New > Blueprint" 선택.

services:
  - type: web
    name: music-similarity
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MUSIC_ENV
        value: production
      - key: MUSIC_LOG_LEVEL
        value: INFO
      - key: MUSIC_MAX_CONCURRENT
        value: "4"
      - key: MUSIC_RATE_LIMIT_PER_MIN
        value: "30"
      - key: MUSIC_ALLOWED_ORIGINS
        # /api 요청을 허용할 origin 을 콤마로 구분해 입력.
        # 비워두면 CORS 자체를 끄고 same-origin 만 허용한다.
        value: ""
