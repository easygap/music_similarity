services:
  app:
    build: .
    image: music-similarity:latest
    container_name: music-similarity
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      # rate limit / 결과 캐시 / metrics 가 in-memory 라 기본 compose 도 단일 worker 로 맞춘다.
      - WEB_CONCURRENCY=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/ready', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
