# 메인 CI 파이프라인.
# - Python 3.11 / 3.12 매트릭스로 ruff + pytest 실행
# - lint/test 통과하면 Docker 이미지를 빌드해본다 (push 는 안 함)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# 같은 브랜치에서 새 푸시가 들어오면 기존 작업은 취소.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: 린트 + 테스트 (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python }} 셋업
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # librosa/soundfile 가 시스템 라이브러리에 의존하므로 미리 설치한다.
      - name: 오디오 시스템 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1 ffmpeg

      - name: Python 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ruff 린트
        run: ruff check backend tests scripts

      - name: pytest 실행
        run: pytest --cov=backend --cov-report=term-missing -q

  docker:
    name: Docker 이미지 빌드
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Buildx 셋업
        uses: docker/setup-buildx-action@v4
      - name: 빌드만 수행 (push 안 함)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: music-similarity:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
