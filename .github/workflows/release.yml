# v* 태그가 푸시되면 자동으로 GitHub Release 를 만든다.
#
# CHANGELOG.md 의 해당 버전 섹션을 잘라서 release body 로 사용한다 — 따로
# 수동으로 release notes 를 쓸 필요 없다. 태그 버전 / backend.__version__ /
# CHANGELOG 섹션이 서로 다르면 릴리즈를 만들지 않는다.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release 생성
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 태그 / 버전 추출
        id: meta
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 릴리즈 태그 정합성 확인
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]

          init_text = pathlib.Path("backend/__init__.py").read_text(encoding="utf-8")
          m = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', init_text)
          if not m:
              raise SystemExit("backend.__version__ 값을 찾지 못했습니다.")

          package_version = m.group(1)
          if package_version != version:
              raise SystemExit(
                  f"태그 버전({version})과 backend.__version__({package_version})이 다릅니다."
              )

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          header = rf"^## \[{re.escape(version)}\]"
          if not re.search(header, changelog, flags=re.MULTILINE):
              raise SystemExit(f"CHANGELOG.md 에 ## [{version}] 섹션이 없습니다.")

          print(f"release version ok: {version}")
          PY
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: CHANGELOG 섹션 추출
        id: notes
        run: |
          # `## [<version>]` 헤더부터 다음 `## [` 까지를 잘라낸다.
          VERSION="${{ steps.meta.outputs.version }}"
          python - <<'PY' > release_notes.md
          import re, pathlib, os
          version = os.environ["VERSION"]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          needle = f"## [{version}]"
          m = re.search(rf"{re.escape(needle)}.*?(?=\n## \[|\Z)", text, flags=re.DOTALL)
          if not m:
              raise SystemExit(f"릴리스 노트가 CHANGELOG 에 없습니다 — {version}")
          print(m.group(0).strip())
          PY
          echo "path=release_notes.md" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: GitHub Release 생성
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file release_notes.md
