[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra --strict-markers"
filterwarnings = [
  "ignore::DeprecationWarning:librosa.*",
  "ignore::DeprecationWarning:sklearn.*",
]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".venv", "data", "uploads", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
