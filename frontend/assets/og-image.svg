<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b18"/>
      <stop offset="1" stop-color="#1a1430"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 로고 마크 -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="80" height="80" rx="22" fill="url(#grad)"/>
    <path d="M28 60V32l28-5v30" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="60" r="7" fill="white"/>
    <circle cx="56" cy="57" r="7" fill="white"/>
    <text x="100" y="55" fill="white" font-family="Pretendard, Inter, sans-serif" font-size="38" font-weight="700">SoundMatch</text>
  </g>

  <!-- 메인 카피 -->
  <g transform="translate(80, 220)">
    <text x="0" y="0" fill="white" font-family="Pretendard, Inter, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5">업로드한 음악과</text>
    <text x="0" y="86" fill="white" font-family="Pretendard, Inter, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5">
      <tspan fill="url(#grad)">가장 닮은 곡</tspan>
      <tspan fill="white">을 찾아드립니다</tspan>
    </text>
  </g>

  <!-- 서브카피 + 태그 -->
  <g transform="translate(80, 430)">
    <text x="0" y="0" fill="rgba(255,255,255,0.78)" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="500">sklearn 코사인 유사도 · librosa 58개 특성 · 닮은 이유까지 한 번에</text>
  </g>

  <g transform="translate(80, 510)" font-family="JetBrains Mono, monospace" font-size="18" fill="rgba(255,255,255,0.55)">
    <text x="0" y="0">#FastAPI</text>
    <text x="120" y="0">#scikit-learn</text>
    <text x="290" y="0">#librosa</text>
    <text x="400" y="0">#WebAudio</text>
    <text x="540" y="0">#한국어·영어</text>
  </g>

  <!-- 우측 데코: 파형 + 레이더 미니어처 -->
  <g transform="translate(800, 210)" opacity="0.85">
    <!-- 파형 막대 -->
    <g fill="url(#grad)">
      <rect x="0" y="40" width="8" height="40" rx="4"/>
      <rect x="14" y="20" width="8" height="80" rx="4"/>
      <rect x="28" y="50" width="8" height="20" rx="4"/>
      <rect x="42" y="0" width="8" height="120" rx="4"/>
      <rect x="56" y="30" width="8" height="60" rx="4"/>
      <rect x="70" y="10" width="8" height="100" rx="4"/>
      <rect x="84" y="40" width="8" height="40" rx="4"/>
      <rect x="98" y="20" width="8" height="80" rx="4"/>
      <rect x="112" y="50" width="8" height="20" rx="4"/>
      <rect x="126" y="5" width="8" height="110" rx="4"/>
      <rect x="140" y="35" width="8" height="50" rx="4"/>
      <rect x="154" y="15" width="8" height="90" rx="4"/>
      <rect x="168" y="40" width="8" height="40" rx="4"/>
      <rect x="182" y="25" width="8" height="70" rx="4"/>
      <rect x="196" y="45" width="8" height="30" rx="4"/>
      <rect x="210" y="10" width="8" height="100" rx="4"/>
      <rect x="224" y="30" width="8" height="60" rx="4"/>
      <rect x="238" y="0" width="8" height="120" rx="4"/>
      <rect x="252" y="50" width="8" height="20" rx="4"/>
      <rect x="266" y="20" width="8" height="80" rx="4"/>
    </g>
  </g>

  <!-- 작은 레이더 차트 -->
  <g transform="translate(880, 360)">
    <polygon points="60,0 120,30 120,90 60,120 0,90 0,30" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <polygon points="60,30 100,45 100,75 60,90 20,75 20,45" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <polygon points="60,15 110,38 110,82 60,105 10,82 10,38" fill="rgba(124,92,255,0.32)" stroke="#7c5cff" stroke-width="2"/>
    <polygon points="60,25 105,42 105,80 60,98 15,80 15,42" fill="rgba(34,211,238,0.22)" stroke="#22d3ee" stroke-width="2"/>
  </g>
</svg>
