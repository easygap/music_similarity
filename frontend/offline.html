<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 · SoundMatch</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/theme-init.js"></script>
  <style>
    .offline-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 32px;
      gap: 18px;
    }
    .off-emoji { font-size: 56px; }
    .off-title { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
    .off-sub { margin: 0; max-width: 460px; color: var(--text-dim); }
    .off-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 12px;
      background: var(--grad-primary);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="bg-canvas" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
  </div>

  <main class="offline-wrap">
    <p class="off-emoji" aria-hidden="true">📡</p>
    <h1 class="off-title" data-i18n="offline.title">지금은 오프라인 상태입니다</h1>
    <p class="off-sub" data-i18n="offline.sub">
      네트워크가 끊겨 분석을 진행할 수 없어요. 연결 상태를 확인하고
      다시 시도해주세요. 이전에 분석했던 결과는 메인 화면 "최근 분석"
      에서 그대로 열어볼 수 있습니다.
    </p>
    <!-- CSP(script-src 'self', unsafe-inline 제거)로 인라인 onclick 은 막힌다.
         앵커로 메인("/")에 다시 접속을 시도한다 — 온라인이면 앱이 뜨고, 아직
         오프라인이면 서비스워커가 이 페이지를 다시 보여준다. -->
    <a class="off-retry" href="/">
      <span data-i18n="offline.retry">메인으로 가서 다시 시도</span>
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-3.5-7M21 4v6h-6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </main>

  <script src="/i18n.js"></script>
</body>
</html>
