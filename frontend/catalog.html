<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카탈로그 둘러보기 · SoundMatch</title>
  <meta name="description" content="SoundMatch 분석의 비교 대상이 되는 곡 카탈로그를 검색해볼 수 있습니다." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <script>
    try {
      var t = localStorage.getItem("soundmatch.theme")
        || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
  <style>
    .cat-wrap { max-width: 1100px; margin: 0 auto; padding: 56px 24px 120px; }
    .cat-head { margin-bottom: 24px; }
    .cat-head h1 { margin: 0 0 6px; font-size: 30px; letter-spacing: -0.02em; }
    .cat-head p { margin: 0; color: var(--text-mute); }
    .cat-search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 24px 0 18px;
    }
    .cat-search {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
    }
    :root[data-theme="light"] .cat-search { background: white; }
    .cat-search:focus {
      outline: 2px solid var(--accent-2);
      outline-offset: 2px;
    }
    .cat-meta { color: var(--text-mute); font-size: 13px; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .cat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.18s, transform 0.18s;
      cursor: pointer;
      text-align: left;
      width: 100%;
      font: inherit;
      color: inherit;
    }
    .cat-card:hover, .cat-card:focus-visible {
      border-color: var(--accent-1);
      transform: translateY(-1px);
      outline: none;
    }
    .cat-card-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .cat-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .cat-fav-btn {
      background: transparent;
      border: none;
      color: var(--text-mute);
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-size: 18px;
      flex-shrink: 0;
    }
    .cat-fav-btn:hover, .cat-fav-btn[data-active="true"] {
      color: var(--accent-warn);
    }
    .cat-fav-btn[data-active="true"] {
      text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
    }
    .cat-title { font-size: 13.5px; font-weight: 600; color: var(--text); word-break: break-all; }
    .cat-artist { font-size: 12px; color: var(--text-mute); }
    .cat-filter-row {
      display: flex;
      gap: 14px;
      align-items: center;
      margin: 6px 0 14px;
      font-size: 13px;
      color: var(--text-mute);
    }
    .cat-filter-row label { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }

    /* 결과 모달 — 카탈로그 카드 클릭 시 그 자리에서 유사 곡을 보여준다. */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(7, 7, 15, 0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      z-index: 100;
    }
    .modal-backdrop.is-open { display: flex; }
    .modal-card {
      width: 100%;
      max-width: 720px;
      background: var(--panel-strong);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 26px 28px;
      box-shadow: var(--shadow-strong);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-title { margin: 0; font-size: 20px; font-weight: 700; word-break: break-all; }
    .modal-sub { margin: 2px 0 0; color: var(--text-mute); font-size: 13.5px; }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-mute);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .modal-tag {
      background: rgba(124, 92, 255, 0.18);
      border: 1px solid rgba(124, 92, 255, 0.4);
      color: #d3c8ff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
    }
    :root[data-theme="light"] .modal-tag { color: #4c2bd6; }
    .modal-hits { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .modal-hits li {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .modal-rank {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      color: var(--accent-2);
      text-align: center;
    }
    .modal-name { font-weight: 600; font-size: 14px; }
    .modal-artist { color: var(--text-mute); font-size: 12.5px; }
    .modal-percent {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: var(--text);
    }
    .modal-loading { text-align: center; color: var(--text-mute); padding: 20px; }
    .cat-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-mute);
      padding: 40px 20px;
    }
    .cat-pager {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }
    .cat-pager button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13.5px;
    }
    .cat-pager button:disabled { opacity: 0.4; cursor: not-allowed; }
    .cat-pager .cat-page-label {
      font-family: "JetBrains Mono", monospace;
      color: var(--text-mute);
      font-size: 13px;
    }
    .cat-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-mute);
      font-size: 13.5px;
      margin-bottom: 16px;
    }
    .cat-back:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="bg-canvas" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
  </div>

  <main class="cat-wrap">
    <a class="cat-back" href="/">← 메인으로</a>
    <header class="cat-head">
      <h1>카탈로그 둘러보기</h1>
      <p>업로드한 음원이 비교되는 카탈로그입니다. 같은 장르 / 음색의 곡이 보이면 매칭이 더 잘 됩니다.</p>
    </header>

    <div class="cat-search-row">
      <input
        type="search"
        class="cat-search"
        id="cat-search-input"
        placeholder="제목이나 아티스트로 검색"
        autocomplete="off"
        spellcheck="false"
      />
      <span class="cat-meta" id="cat-meta">불러오는 중…</span>
    </div>

    <div class="cat-filter-row">
      <label>
        <input type="checkbox" id="cat-favorites-only">
        즐겨찾기만 보기
      </label>
    </div>

    <div class="cat-grid" id="cat-grid"></div>

    <div class="cat-pager">
      <button type="button" id="cat-prev">← 이전</button>
      <span class="cat-page-label" id="cat-page-label">1</span>
      <button type="button" id="cat-next">다음 →</button>
    </div>
  </main>

  <!-- 카드 클릭 시 열리는 결과 모달 -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <header class="modal-head">
        <div>
          <h2 class="modal-title" id="modal-title">—</h2>
          <p class="modal-sub" id="modal-sub">—</p>
        </div>
        <button type="button" class="modal-close" id="modal-close" aria-label="닫기">×</button>
      </header>
      <div class="modal-tags" id="modal-tags"></div>
      <div id="modal-body">
        <p class="modal-loading">불러오는 중…</p>
      </div>
    </div>
  </div>

  <script src="/favorites.js"></script>
  <script>
  (function () {
    var input = document.getElementById("cat-search-input");
    var grid = document.getElementById("cat-grid");
    var meta = document.getElementById("cat-meta");
    var prev = document.getElementById("cat-prev");
    var next = document.getElementById("cat-next");
    var pageLabel = document.getElementById("cat-page-label");
    var favOnly = document.getElementById("cat-favorites-only");

    var state = { q: "", page: 1, size: 24, total: 0, hasMore: false, favOnly: false };
    var debounceTimer = null;
    var Fav = window.SoundMatchFavorites;

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    async function load() {
      meta.textContent = "불러오는 중…";

      // 즐겨찾기 전용 모드는 백엔드 호출 없이 localStorage 만 사용한다.
      if (state.favOnly && Fav) {
        var favs = Fav.list().filter(function (f) {
          if (!state.q) return true;
          return (f.name || "").toLowerCase().indexOf(state.q.toLowerCase()) !== -1;
        });
        var start = (state.page - 1) * state.size;
        var end = start + state.size;
        var slice = favs.slice(start, end).map(function (f) {
          return { title: f.title, artist: f.artist };
        });
        state.total = favs.length;
        state.hasMore = end < favs.length;
        render(slice);
        if (favs.length === 0) {
          meta.textContent = "즐겨찾기 없음";
        } else {
          var rs = start + 1;
          var re = Math.min(rs + slice.length - 1, favs.length);
          meta.textContent = favs.length.toLocaleString("ko-KR") + "곡 중 " + rs + "–" + re;
        }
        pageLabel.textContent = "p. " + state.page;
        prev.disabled = state.page <= 1;
        next.disabled = !state.hasMore;
        return;
      }

      try {
        var url = "/api/catalog/search?q=" + encodeURIComponent(state.q)
          + "&page=" + state.page + "&size=" + state.size;
        var res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        state.total = data.total;
        state.hasMore = data.has_more;
        render(data.items);
        var rangeStart = (state.page - 1) * state.size + 1;
        var rangeEnd = Math.min(rangeStart + data.items.length - 1, data.total);
        if (data.total === 0) {
          meta.textContent = "결과 없음";
        } else {
          meta.textContent = data.total.toLocaleString("ko-KR") + "곡 중 "
            + rangeStart + "–" + rangeEnd;
        }
        pageLabel.textContent = "p. " + state.page;
        prev.disabled = state.page <= 1;
        next.disabled = !state.hasMore;
      } catch (e) {
        meta.textContent = "불러오기에 실패했어요";
        grid.innerHTML = '<p class="cat-empty">잠시 후 다시 시도해주세요.</p>';
      }
    }

    function render(items) {
      if (!items || !items.length) {
        var msg = state.favOnly
          ? '즐겨찾기에 저장된 곡이 없어요. 카탈로그 카드의 ★ 버튼으로 추가해보세요.'
          : '해당하는 곡이 없어요. 다른 키워드로 검색해보세요.';
        grid.innerHTML = '<p class="cat-empty">' + msg + '</p>';
        return;
      }
      grid.innerHTML = items.map(function (it) {
        var key = it.title + ' - ' + it.artist;
        var isFav = Fav ? Fav.has(key) : false;
        return '<div class="cat-card" data-key="' + escapeHtml(key) + '"'
          + ' title="이 곡과 유사한 다른 곡 보기" tabindex="0" role="button">'
          + '<div class="cat-card-head">'
          +   '<div class="cat-card-body">'
          +     '<span class="cat-title">' + escapeHtml(it.title) + '</span>'
          +     '<span class="cat-artist">' + escapeHtml(it.artist) + '</span>'
          +   '</div>'
          +   '<button type="button" class="cat-fav-btn" data-fav="' + escapeHtml(key)
          +     '" data-title="' + escapeHtml(it.title) + '" data-artist="' + escapeHtml(it.artist)
          +     '" data-active="' + (isFav ? 'true' : 'false')
          +     '" aria-pressed="' + (isFav ? 'true' : 'false')
          +     '" title="' + (isFav ? '즐겨찾기 해제' : '즐겨찾기 추가') + '">★</button>'
          + '</div>'
          + '</div>';
      }).join("");

      grid.querySelectorAll(".cat-card").forEach(function (el) {
        el.addEventListener("click", function (e) {
          // ★ 버튼 클릭은 상위 카드 클릭과 분리.
          if (e.target.closest(".cat-fav-btn")) return;
          openSimilarModal(el.getAttribute("data-key"));
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openSimilarModal(el.getAttribute("data-key"));
          }
        });
      });

      grid.querySelectorAll(".cat-fav-btn").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (!Fav) return;
          var key = btn.getAttribute("data-fav");
          Fav.toggle(key, btn.getAttribute("data-title"), btn.getAttribute("data-artist"));
          var nowActive = Fav.has(key);
          btn.setAttribute("data-active", nowActive ? "true" : "false");
          btn.setAttribute("aria-pressed", nowActive ? "true" : "false");
          btn.title = nowActive ? "즐겨찾기 해제" : "즐겨찾기 추가";
          // favOnly 모드에서 마지막 항목을 풀면 화면이 비어버려야 한다.
          if (state.favOnly) load();
        });
      });
    }

    // -------------------- 결과 모달 --------------------
    var modal = document.getElementById("modal-backdrop");
    var modalTitle = document.getElementById("modal-title");
    var modalSub = document.getElementById("modal-sub");
    var modalBody = document.getElementById("modal-body");
    var modalTags = document.getElementById("modal-tags");
    var modalClose = document.getElementById("modal-close");
    var _lastFocusedEl = null;

    function closeModal() {
      modal.classList.remove("is-open");
      document.body.style.overflow = "";
      if (_lastFocusedEl) _lastFocusedEl.focus();
    }
    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", function (e) {
      if (e.target === modal) closeModal();
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && modal.classList.contains("is-open")) closeModal();
    });

    async function openSimilarModal(name) {
      _lastFocusedEl = document.activeElement;
      modal.classList.add("is-open");
      document.body.style.overflow = "hidden";
      modalTitle.textContent = "—";
      modalSub.textContent = "분석 중…";
      modalTags.innerHTML = "";
      modalBody.innerHTML = '<p class="modal-loading">불러오는 중…</p>';
      try {
        var url = "/api/analyze/by-catalog?top_n=5&name=" + encodeURIComponent(name);
        var res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        modalTitle.textContent = data.title;
        modalSub.textContent = data.artist + " · " + data.catalog_size.toLocaleString("ko-KR") + "곡과 비교";
        modalTags.innerHTML = (data.tags || []).map(function (tg) {
          return '<span class="modal-tag">' + escapeHtml(tg) + '</span>';
        }).join("");
        if (!data.results || !data.results.length) {
          modalBody.innerHTML = '<p class="modal-loading">유사한 곡을 찾지 못했어요.</p>';
          return;
        }
        modalBody.innerHTML = '<ol class="modal-hits">' + data.results.map(function (r) {
          return '<li>'
            + '<span class="modal-rank">' + r.rank + '</span>'
            + '<span><span class="modal-name">' + escapeHtml(r.title) + '</span>'
            + ' · <span class="modal-artist">' + escapeHtml(r.artist) + '</span></span>'
            + '<span class="modal-percent">' + r.similarity_percent.toFixed(1) + '%</span>'
            + '</li>';
        }).join("") + '</ol>';
      } catch (e) {
        modalBody.innerHTML = '<p class="modal-loading">불러오기에 실패했어요. 잠시 후 다시 시도해주세요.</p>';
      }
    }

    input.addEventListener("input", function () {
      // 입력 직후 바로 fetch 하면 한글 IME 입력마다 호출되므로 280ms 디바운스.
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () {
        state.q = input.value.trim();
        state.page = 1;
        load();
      }, 280);
    });
    prev.addEventListener("click", function () { if (state.page > 1) { state.page--; load(); } });
    next.addEventListener("click", function () { if (state.hasMore) { state.page++; load(); } });
    if (favOnly) {
      favOnly.addEventListener("change", function () {
        state.favOnly = favOnly.checked;
        state.page = 1;
        load();
      });
    }
    // 다른 페이지에서 추가/해제 시 카탈로그 페이지도 즉시 갱신.
    window.addEventListener("favorites:change", function () { load(); });

    load();
  })();
  </script>
</body>
</html>
