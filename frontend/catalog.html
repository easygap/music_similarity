<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카탈로그 둘러보기 · SoundMatch</title>
  <meta name="description" content="SoundMatch 분석의 비교 대상이 되는 곡 카탈로그를 검색해볼 수 있습니다." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/theme-init.js"></script>
  <style>
    .cat-wrap { max-width: 1100px; margin: 0 auto; padding: 36px 24px 72px; }
    .cat-head { margin-bottom: 24px; }
    .cat-head h1 { margin: 0 0 6px; font-size: 30px; letter-spacing: -0.02em; }
    .cat-head p { margin: 0; color: var(--text-mute); }
    .cat-search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 24px 0 18px;
    }
    .cat-search-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    .cat-search {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 12px 38px 12px 16px;
      border-radius: 12px;
      font-size: 15px;
    }
    /* WebKit 의 기본 type=search clear (×) 아이콘 제거 — 우리 커스텀 버튼 사용. */
    .cat-search::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
    :root[data-theme="light"] .cat-search { background: white; }
    .cat-search:focus {
      outline: 2px solid var(--accent-2);
      outline-offset: 2px;
    }
    .cat-search-clear {
      position: absolute;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .cat-search-clear:hover, .cat-search-clear:focus-visible {
      background: rgba(124, 92, 255, 0.35);
      outline: none;
    }
    :root[data-theme="light"] .cat-search-clear {
      background: rgba(0, 0, 0, 0.08);
    }
    :root[data-theme="light"] .cat-search-clear:hover {
      background: rgba(124, 92, 255, 0.2);
    }
    .cat-meta { color: var(--text-mute); font-size: 13px; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .cat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.18s, transform 0.18s;
      cursor: pointer;
      text-align: left;
      width: 100%;
      font: inherit;
      color: inherit;
    }
    .cat-card:hover, .cat-card:focus-visible {
      border-color: var(--accent-1);
      transform: translateY(-1px);
      outline: none;
    }
    /* 카드 클릭 후 모달 fetch 동안 — accent 테두리 + 은은한 펄스로 "처리 중" 표시. */
    .cat-card.is-loading {
      border-color: var(--accent-1);
      animation: cat-card-pulse 1s ease-in-out infinite;
      cursor: progress;
    }
    @keyframes cat-card-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    @media (prefers-reduced-motion: reduce) {
      .cat-card.is-loading { animation: none; }
    }
    .cat-card-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .cat-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .cat-fav-btn {
      background: transparent;
      border: none;
      color: var(--text-mute);
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-size: 18px;
      flex-shrink: 0;
    }
    .cat-fav-btn:hover, .cat-fav-btn[data-active="true"] {
      color: var(--accent-warn);
    }
    .cat-fav-btn[data-active="true"] {
      text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
    }
    .cat-title { font-size: 13.5px; font-weight: 600; color: var(--text); word-break: break-all; }
    .cat-artist { font-size: 12px; color: var(--text-mute); }
    /* 로딩 스켈레톤 카드 — 검색/필터/페이지 이동 동안 자리를 잡아 레이아웃 점프(CLS) 방지.
       skel-shimmer / --panel-skel 는 공용 style.css 에 정의돼 있어 그대로 재사용. */
    .cat-card-skel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .cat-card-skel .skel-line {
      background: var(--panel-skel);
      border-radius: 6px;
      animation: skel-shimmer 1.4s ease-in-out infinite;
    }
    .cat-card-skel .skel-line.t { height: 13px; width: 70%; }
    .cat-card-skel .skel-line.a { height: 11px; width: 45%; }
    .cat-card-skel .skel-line.m { height: 10px; width: 88%; margin-top: 4px; }
    .cat-metrics {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.02em;
      display: flex;
      gap: 4px 10px;
      flex-wrap: wrap;
    }
    .cat-metrics .sep { opacity: 0.4; }
    /* 검색어 매칭 부분 강조 — 기본 <mark> 노란색 대신 accent 계열 톤. */
    .cat-highlight {
      background: rgba(124, 92, 255, 0.28);
      color: inherit;
      padding: 0 1px;
      border-radius: 3px;
    }
    :root[data-theme="light"] .cat-highlight {
      background: rgba(124, 92, 255, 0.22);
    }
    .cat-filter-row {
      display: flex;
      gap: 14px;
      align-items: center;
      margin: 6px 0 14px;
      font-size: 13px;
      color: var(--text-mute);
    }
    .cat-filter-row label { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .cat-fav-count {
      display: inline-block;
      min-width: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(124, 92, 255, 0.25);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      line-height: 16px;
    }
    #cat-favorites-only-label.is-empty {
      opacity: 0.55;
      cursor: not-allowed;
    }
    #cat-favorites-only-label.is-empty input { cursor: not-allowed; }
    .cat-filter-range input[type="number"],
    .cat-filter-range select {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 13px;
      width: 70px;
    }
    .cat-filter-range select { width: auto; padding-right: 20px; }
    :root[data-theme="light"] .cat-filter-range input[type="number"],
    :root[data-theme="light"] .cat-filter-range select {
      background: white;
    }
    .cat-filter-row { flex-wrap: wrap; }

    .cat-hist {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    /* 최근 본 곡 — cat-hist 와 같은 패널 톤. 칩 행. */
    .cat-recent {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    .cat-recent[hidden] { display: none; }
    .cat-recent-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12.5px;
      color: var(--text-mute);
      margin-bottom: 8px;
    }
    .cat-recent-clear {
      background: transparent;
      border: none;
      color: var(--text-mute);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 4px;
    }
    .cat-recent-clear:hover { color: var(--accent-1); }
    .cat-recent-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .cat-recent-chip {
      background: rgba(124, 92, 255, 0.12);
      border: 1px solid rgba(124, 92, 255, 0.32);
      color: var(--text);
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: border-color 0.14s ease, background 0.14s ease;
    }
    .cat-recent-chip:hover, .cat-recent-chip:focus-visible {
      border-color: var(--accent-1);
      background: rgba(124, 92, 255, 0.2);
    }
    .cat-recent-chip .chip-artist { color: var(--text-mute); }
    .cat-hist-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12.5px;
      color: var(--text-mute);
      margin-bottom: 8px;
    }
    .cat-hist-sub { font-family: "JetBrains Mono", monospace; }
    .cat-hist-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 64px;
    }
    .cat-hist-bar {
      flex: 1;
      background: var(--grad-primary);
      border-radius: 4px 4px 0 0;
      opacity: 0.7;
      min-height: 4px;
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .cat-hist-bar:hover, .cat-hist-bar:focus-visible {
      opacity: 1;
      transform: translateY(-2px);
      outline: none;
    }
    .cat-hist-bar[data-active="true"] {
      opacity: 1;
      box-shadow: 0 -2px 0 var(--accent-2);
    }

    /* 결과 모달 — 카탈로그 카드 클릭 시 그 자리에서 유사 곡을 보여준다. */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(7, 7, 15, 0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      z-index: 100;
    }
    .modal-backdrop.is-open { display: flex; }
    .modal-card {
      width: 100%;
      max-width: 720px;
      background: var(--panel-strong);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 26px 28px;
      box-shadow: var(--shadow-strong);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-title { margin: 0; font-size: 20px; font-weight: 700; word-break: break-all; }
    .modal-sub { margin: 2px 0 0; color: var(--text-mute); font-size: 13.5px; }
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-mute);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-head-text { min-width: 0; flex: 1; }
    /* 모달 헤더 안의 시드 곡 메트릭 mini-row — 카드의 cat-metrics 와 같은 톤. */
    .modal-seed-metrics {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .modal-seed-metrics[hidden], .modal-seed-metrics:empty { display: none; }
    .modal-seed-metrics .sep { color: var(--text-mute); }
    /* 모달 헤더 우측 액션 그룹 — fav + copy + close 가 나란히 */
    .modal-head-actions { display: flex; align-items: center; gap: 6px; }
    /* 시드 곡 즐겨찾기 버튼 — 카드 ★ 와 같은 톤. */
    .modal-fav-seed {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-mute);
      width: 32px; height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .modal-fav-seed:hover { color: var(--accent-warn); border-color: var(--accent-warn); }
    .modal-fav-seed[aria-pressed="true"] {
      color: var(--accent-warn);
      border-color: var(--accent-warn);
      text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
    }
    .modal-copy-link {
      background: transparent;
      color: var(--text-mute);
      border: 1px solid var(--border-strong);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12.5px;
      cursor: pointer;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .modal-copy-link:hover { color: var(--accent-2); border-color: var(--accent-2); }
    .modal-copy-link.is-copied {
      color: var(--accent-2);
      border-color: var(--accent-2);
      background: rgba(34, 211, 238, 0.08);
    }
    /* 우상단 떠 있는 작은 토스트 */
    .cat-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(20, 30, 48, 0.92);
      border: 1px solid var(--border-strong);
      color: var(--text);
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }
    .cat-toast.is-visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    :root[data-theme="light"] .cat-toast {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
    }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .modal-tag {
      background: rgba(124, 92, 255, 0.18);
      border: 1px solid rgba(124, 92, 255, 0.4);
      color: #d3c8ff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
    }
    :root[data-theme="light"] .modal-tag { color: #4c2bd6; }
    .modal-hits { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .modal-hits li {
      display: grid;
      grid-template-columns: 36px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .modal-actions { display: flex; gap: 4px; }
    .modal-fav, .modal-seed {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-mute);
      width: 28px; height: 28px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
    }
    .modal-fav:hover, .modal-seed:hover { color: var(--text); border-color: var(--accent-1); }
    .modal-fav[data-active="true"] { color: var(--accent-warn); border-color: var(--accent-warn); }
    .modal-rank {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      color: var(--accent-2);
      text-align: center;
    }
    .modal-name { font-weight: 600; font-size: 14px; }
    .modal-artist { color: var(--text-mute); font-size: 12.5px; }
    /* 카탈로그 카드의 .cat-metrics 헬퍼를 모달 안에서도 재사용 — 줄바꿈만 강제. */
    .modal-hits .cat-metrics { display: flex; margin-top: 2px; }
    .modal-percent {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: var(--text);
    }
    .modal-loading { text-align: center; color: var(--text-mute); padding: 20px; }
    .cat-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-mute);
      padding: 40px 20px 16px;
    }
    .cat-empty-reset {
      grid-column: 1 / -1;
      display: block;
      margin: 0 auto 28px;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 13.5px;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }
    .cat-empty-reset:hover, .cat-empty-reset:focus-visible {
      border-color: var(--accent-1);
      color: var(--accent-1);
      outline: none;
    }
    .cat-pager {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }
    .cat-pager button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13.5px;
    }
    .cat-pager button:disabled { opacity: 0.4; cursor: not-allowed; }
    .cat-pager .cat-page-jump {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      padding: 8px 12px;
      min-width: 36px;
    }
    .cat-pager .cat-page-label {
      font-family: "JetBrains Mono", monospace;
      color: var(--text-mute);
      font-size: 13px;
    }
    /* 필터 행 우측 끝에 붙는 CSV 내보내기 버튼.
       기존 pager 버튼과 톤을 맞추되 살짝 강조 — 다운로드 액션이라 우연 클릭은 피하면서도
       "찾을 수 있는" 위치여야 한다. */
    .cat-export-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
      padding: 7px 12px;
      border-radius: 9px;
      font-size: 13px;
      cursor: pointer;
      margin-left: auto;  /* flex row 우측 정렬 */
    }
    .cat-export-btn:hover { border-color: var(--accent-1); color: var(--accent-1); }
    .cat-export-btn:active { transform: translateY(1px); }
    /* 모바일에선 margin-left:auto 가 자기 줄로 떨어져 어색하므로 폭 100% 로 */
    @media (max-width: 720px) {
      .cat-export-btn { margin-left: 0; width: 100%; text-align: center; }
    }
    .cat-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-mute);
      font-size: 13.5px;
      margin-bottom: 16px;
    }
    .cat-back:hover { color: var(--text); }
  </style>
</head>
<body>
  <!-- JS 비활성 환경 안내 — index.html 과 동일 폴백. -->

    <div class="noscript-banner" role="alert" style="
      max-width: 760px; margin: 24px auto; padding: 18px 22px;
      border: 1px solid #ff6b6b; border-radius: 14px;
      background: rgba(255, 107, 107, 0.1); color: #fff;
      font-family: 'Pretendard', system-ui, sans-serif; line-height: 1.6;

        이 사이트는 JavaScript 가 켜져 있어야 동작합니다.
      </strong>
      <span style="font-size: 13.5px; opacity: 0.85;">
        브라우저 설정에서 JavaScript 를 허용해주세요. /
        This site requires JavaScript.
      </span>
    </div>
  </noscript>

  <div class="bg-canvas" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
  </div>

  <header class="site-nav">
    <a class="brand" href="/">
      <svg viewBox="0 0 32 32" class="brand-mark" aria-hidden="true">
        <defs>
          <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#7c5cff" />
            <stop offset="1" stop-color="#22d3ee" />
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="28" height="28" rx="9" fill="url(#g1)" />
        <path d="M11 22V11l10-2v11" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="11" cy="22" r="2.4" fill="white" />
        <circle cx="21" cy="20" r="2.4" fill="white" />
      </svg>
      <span>SoundMatch</span>
    </a>
    <nav class="site-nav-links" aria-label="Primary">
      <div class="nav-links-group" id="nav-links-group">
        <a href="/catalog" data-i18n="nav.catalog" aria-current="page">카탈로그</a>
        <a href="/#how" data-i18n="nav.how">사용법</a>
        <a href="/compare" data-i18n="nav.compare">비교</a>
        <a href="https://github.com/easygap/music_similarity" target="_blank" rel="noopener" data-i18n="nav.github">GitHub</a>
      </div>
      <button type="button" class="nav-menu-toggle" id="nav-menu-toggle"
              aria-expanded="false" aria-controls="nav-links-group"
              aria-label="메뉴 열기" data-i18n-attr="aria-label:nav.menuToggle">
        <svg class="nav-menu-icon-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg class="nav-menu-icon-close" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="icon-btn" id="theme-toggle" aria-label="Toggle theme" data-i18n-attr="aria-label:controls.themeToggle">
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 13a8 8 0 0 1-10-10 8.5 8.5 0 1 0 10 10z" fill="currentColor"/></svg>
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>
      </button>
      <button type="button" class="ghost-pill" id="lang-toggle" data-i18n="controls.langToggle">Language: English</button>
    </nav>
  </header>

  <main class="cat-wrap">
    <header class="cat-head">
      <h1 data-i18n="catalog.title">카탈로그 둘러보기</h1>
      <p data-i18n="catalog.sub">업로드한 음원이 비교되는 카탈로그입니다. 같은 장르 / 음색의 곡이 보이면 매칭이 더 잘 됩니다.</p>
    </header>

    <div class="cat-search-row">
      <div class="cat-search-wrap">
        <input
          type="search"
          class="cat-search"
          id="cat-search-input"
          placeholder="제목이나 아티스트로 검색"
          data-i18n-attr="placeholder:catalog.searchPlaceholder"
          autocomplete="off"
          spellcheck="false"
          list="cat-recent-searches"
        />
        <!-- 최근 검색어 datalist — JS 가 localStorage 의 history 로 채운다. -->
        <datalist id="cat-recent-searches"></datalist>
        <button
          type="button"
          class="cat-search-clear"
          id="cat-search-clear"
          aria-label="검색어 지우기"
          data-i18n-attr="aria-label:catalog.searchClear"
          hidden
        >×</button>
      </div>
      <span class="cat-meta" id="cat-meta" data-i18n="catalog.loading">불러오는 중…</span>
    </div>

    <div class="cat-filter-row">
      <label id="cat-favorites-only-label">
        <input type="checkbox" id="cat-favorites-only">
        <span data-i18n="catalog.favoritesOnly">즐겨찾기만 보기</span>
        <span class="cat-fav-count" id="cat-fav-count" hidden></span>
      </label>
      <label class="cat-filter-range">
        BPM
        <input type="number" id="cat-min-bpm" placeholder="min" min="0" max="400" step="1">
        ~
        <input type="number" id="cat-max-bpm" placeholder="max" min="0" max="400" step="1">
      </label>
      <label class="cat-filter-range">
        <span data-i18n="summary.energy">에너지</span>
        <input type="number" id="cat-min-energy" placeholder="min" min="0" max="1" step="0.05">
        ~
        <input type="number" id="cat-max-energy" placeholder="max" min="0" max="1" step="0.05">
      </label>
      <label class="cat-filter-range">
        <span data-i18n="catalog.sortLabel">정렬</span>
        <select id="cat-sort">
          <option value="default" data-i18n="catalog.sortDefault">기본</option>
          <option value="title" data-i18n="catalog.sortTitle">곡명</option>
          <option value="artist" data-i18n="catalog.sortArtist">아티스트</option>
          <option value="bpm" data-i18n="catalog.sortBpm">BPM 낮은 순</option>
          <option value="energy" data-i18n="catalog.sortEnergy">에너지 낮은 순</option>
          <option value="shuffle" data-i18n="catalog.sortShuffle">🎲 무작위</option>
        </select>
      </label>
      <label class="cat-filter-range">
        <span data-i18n="catalog.sizeLabel">페이지당</span>
        <select id="cat-size">
          <option value="24">24</option>
          <option value="48">48</option>
          <option value="96">96</option>
        </select>
      </label>
      <button
        type="button"
        id="cat-export-csv"
        class="cat-export-btn"
        data-i18n="catalog.exportCsv"
        data-i18n-attr="title:catalog.exportCsvHint"
        title="현재 필터에 걸린 곡 전체를 CSV 파일로 내려받습니다."
      >CSV 내보내기</button>
    </div>

    <!-- 최근 본 곡 — 모달을 열어봤던 곡을 칩으로. 비어 있으면 통째로 숨김. -->
    <div class="cat-recent" id="cat-recent" hidden>
      <div class="cat-recent-head">
        <span data-i18n="catalog.recentViewed">최근 본 곡</span>
        <button type="button" class="cat-recent-clear" id="cat-recent-clear"
                data-i18n="catalog.recentClear">지우기</button>
      </div>
      <div class="cat-recent-chips" id="cat-recent-chips"></div>
    </div>

    <!-- BPM 분포 미니 차트 (페이지 처음 진입 시 한 번만 로드). -->
    <div class="cat-hist" id="cat-hist" aria-hidden="true">
      <div class="cat-hist-head">
        <span data-i18n="catalog.bpmDist">BPM 분포</span>
        <span class="cat-hist-sub" id="cat-hist-sub" data-i18n="catalog.loading">불러오는 중…</span>
      </div>
      <div class="cat-hist-bars" id="cat-hist-bars"></div>
    </div>

    <!-- aria-keyshortcuts: 스크린리더가 카드에 포커스가 가면 "←→ 이동, Enter 열기" 같은 힌트를
         읽어준다. 시각 UI 는 깔끔하게 유지하면서 키보드/보조기기 사용자에게는 단축키를 알린다. -->
    <div class="cat-grid" id="cat-grid"
         role="list"
         aria-keyshortcuts="ArrowLeft ArrowRight ArrowUp ArrowDown Home End Enter"
         data-i18n-attr="aria-description:catalog.gridShortcuts"
         aria-description="화살표 키로 카드 이동, Enter 로 상세 보기"></div>

    <div class="cat-pager">
      <button type="button" id="cat-first" class="cat-page-jump"
              aria-label="처음 페이지" data-i18n-attr="aria-label:catalog.first" title="첫 페이지">⇤</button>
      <button type="button" id="cat-prev" data-i18n="catalog.prev">← 이전</button>
      <span class="cat-page-label" id="cat-page-label">1</span>
      <button type="button" id="cat-next" data-i18n="catalog.next">다음 →</button>
      <button type="button" id="cat-last" class="cat-page-jump"
              aria-label="마지막 페이지" data-i18n-attr="aria-label:catalog.last" title="마지막 페이지">⇥</button>
    </div>
  </main>

  <!-- 카드 클릭 시 열리는 결과 모달 -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <header class="modal-head">
        <div class="modal-head-text">
          <h2 class="modal-title" id="modal-title">—</h2>
          <p class="modal-sub" id="modal-sub">—</p>
          <!-- 시드 곡의 BPM / E / Hz mini-row — 카드와 같은 패턴으로 모달 안에서도 노출. -->
          <div class="modal-seed-metrics" id="modal-seed-metrics" aria-hidden="true"></div>
        </div>
        <div class="modal-head-actions">
          <!-- 시드 곡 즐겨찾기 토글 — 모달 안에서도 카드 ★ 와 동일하게 동작. -->
          <button type="button" class="modal-fav-seed" id="modal-fav-seed"
                  aria-pressed="false"
                  data-i18n-attr="aria-label:catalog.modalFavSeed"
                  aria-label="이 곡 즐겨찾기 토글">★</button>
          <!-- 현재 URL 의 ?song= deep link 를 클립보드에 복사. 같은 곡 화면으로 바로 보낼 수 있다. -->
          <button type="button" class="modal-copy-link" id="modal-copy-link"
                  data-i18n="catalog.copyLink"
                  data-i18n-attr="aria-label:catalog.copyLinkAria"
                  aria-label="공유 링크 복사">🔗 링크</button>
          <button type="button" class="modal-close" id="modal-close"
                  aria-label="닫기" data-i18n-attr="aria-label:catalog.modalClose">×</button>
        </div>
      </header>
      <div class="modal-tags" id="modal-tags"></div>
      <div id="modal-body">
        <p class="modal-loading" data-i18n="catalog.modalLoading">불러오는 중…</p>
      </div>
    </div>
  </div>

  <!-- 라이브 토스트 — "복사됨" 같은 짧은 알림. polite 이라 보이스오버에 끼어들지 않음. -->
  <div class="cat-toast" id="cat-toast" role="status" aria-live="polite" hidden></div>

  <footer class="site-foot">
    <p data-i18n="footer.tagline">졸업작품에서 출발해, 시중 서비스급으로 끝까지 다듬은 프로젝트</p>
    <p class="muted">
      © <span id="year"></span> SoundMatch ·
      <a href="/privacy" data-i18n="footer.privacy">개인정보 처리방침</a> ·
      <a href="/terms" data-i18n="footer.terms">이용약관</a> ·
      <a href="https://github.com/easygap/music_similarity" target="_blank" rel="noopener" data-i18n="footer.repoLink">GitHub</a>
    </p>
    <p class="muted" data-i18n="footer.notice">서버에 음원을 영구 저장하지 않습니다.</p>
  </footer>

  <script src="/i18n.js"></script>
  <script src="/site-nav.js"></script>
  <script src="/favorites.js"></script>
  <script src="/catalog.js"></script>
  <script src="/sw-register.js"></script>
</body>
</html>
