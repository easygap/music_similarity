# Fly.io deployment config.
# Usage:
#   fly launch --no-deploy            (first-time)
#   fly deploy
#
# The app is single-region; bump `min_machines_running` if traffic grows.

app = "music-similarity"
primary_region = "nrt"  # Tokyo — closest to KR users; change as needed.

[build]
  dockerfile = "Dockerfile"

[env]
  MUSIC_ENV = "production"
  MUSIC_LOG_LEVEL = "INFO"
  MUSIC_MAX_CONCURRENT = "4"
  MUSIC_RATE_LIMIT_PER_MIN = "30"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
