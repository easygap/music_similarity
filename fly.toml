# Fly.io 배포 설정.
# 사용 예:
#   fly launch --no-deploy   # 최초 1회
#   fly deploy
#
# 단일 리전 구성이고, 트래픽이 늘면 min_machines_running 을 올려라.

app = "music-similarity"
primary_region = "nrt"  # Tokyo — 한국 사용자 기준 가장 가까움.

[build]
  dockerfile = "Dockerfile"

[env]
  MUSIC_ENV = "production"
  MUSIC_LOG_LEVEL = "INFO"
  MUSIC_MAX_CONCURRENT = "4"
  MUSIC_RATE_LIMIT_PER_MIN = "30"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# 헬스체크 — /api/health 가 카탈로그 로드 실패 시 503 을 돌려준다.
[[http_service.checks]]
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
