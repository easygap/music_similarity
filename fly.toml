# Fly.io 배포 설정.
# 사용 예:
#   fly launch --no-deploy   # 최초 1회
#   fly deploy
#
# 단일 리전 구성이고, 트래픽이 늘면 min_machines_running 을 올려라.

app = "music-similarity"
primary_region = "nrt"  # Tokyo — 한국 사용자 기준 가장 가까움.

[build]
  dockerfile = "Dockerfile"

[env]
  MUSIC_ENV = "production"
  MUSIC_LOG_LEVEL = "INFO"
  MUSIC_MAX_CONCURRENT = "4"
  MUSIC_RATE_LIMIT_PER_MIN = "30"
  # Fly.io 의 edge 프록시 IP 가 자동 발급이라 고정 화이트리스트가 어렵다.
  # PaaS 외부 직접 노출 경로가 없으므로 와일드카드(*) 로 XFF 신뢰. 자세한
  # 보안 모델은 README "환경 변수" 표 참고.
  MUSIC_TRUSTED_PROXIES = "*"
  # 단일 worker 운영. _rate_state / 결과 캐시 / metrics 가 모두 in-memory 라
  # 다중 워커면 값이 파편화되어 rate limit 한도가 실제로 워커 수만큼 곱해진다.
  # Redis 백엔드를 붙이기 전까지는 1 워커 + 수직 확장 + 멀티 머신으로 처리.
  WEB_CONCURRENCY = "1"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# 헬스체크 — /api/ready 는 strict health 로 ML import / 업로드 디렉토리까지 본다.
[[http_service.checks]]
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/api/ready"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
